# Switch backends here as hardware comes online.
# "mock" backends need no hardware/SDKs and are used for local dev.

camera:
  backend: picamera2    # mock | picamera2
  resolution: [640, 480]
  fps: 30

detector:
  backend: hailo_yolov8   # mock | hailo_yolov8
  model_path: "/usr/share/hailo-models/yolov8s_h8l.hef"
  confidence_threshold: 0.4

face_recognizer:
  backend: opencv_lbph   # mock | opencv_lbph
  owner_name: owner

web:
  host: 0.0.0.0
  port: 8000

llm:
  backend: ollama        # mock | ollama
  model: qwen2.5-coder:3b
  host: http://localhost:11434

voice:
  backend: piper          # mock | piper
  model_path: "data/voices/en_US-norman-medium.onnx"
  length_scale: 1.15      # >1 = slower, more deliberate delivery
  pitch_scale: 0.92       # <1 = deeper pitch

addons: []
